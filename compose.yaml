services:
  api:
    build:
      context: ./backend
    command: sh /app/start.sh --reload
    env_file: .env
    ports:
      - "8000:8000"
    volumes:
      - ./backend:/app
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy

  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: showroomflow
      POSTGRES_USER: showroomflow
      POSTGRES_PASSWORD: showroomflow
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U showroomflow -d showroomflow"]
      interval: 5s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7-alpine
    command: redis-server --appendonly yes
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10

  minio:
    image: minio/minio:latest
    command: server /data --console-address :9001
    environment:
      MINIO_ROOT_USER: ${SHOWROOMFLOW_STORAGE_ACCESS_KEY:-showroomflow}
      MINIO_ROOT_PASSWORD: ${SHOWROOMFLOW_STORAGE_SECRET_KEY:-replace-this-storage-secret}
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - object_data:/data

volumes:
  postgres_data:
  redis_data:
  object_data:
